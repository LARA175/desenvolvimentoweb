<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body >

    <table align="center">

        <tr>
            <td align="center">

                <h1>BEM-VINDO</h1>

                <h3>Cadastro de Produtos</h3>

                <form>

                    <label>Nome do Produto</label><br>
                    <input type="text"><br><br>

                    <label>Categoria</label><br>
                    <select>
                        <option>Selecione uma opção</option>
                        <option>Luminária de Mesa</option>
                        <option>Luminária de Teto</option>
                        <option>Abajur</option>
                        <option>LED</option>
                    </select><br><br>

                    <label>Marca</label><br>
                    <input type="text"><br><br>

                    <label>Unidade de Medida</label><br>
                    <select>
                        <option>Selecione uma opção</option>
                        <option>Unidade</option>
                        <option>Caixa</option>
                        <option>Kit</option>
                    </select><br><br>

                    <label>Quantidade em Estoque</label><br>
                    <input type="number"><br><br>

                    <label>Lote</label><br>
                    <input type="text"><br><br>

                    <label>Preço de Compra</label><br>
                    <input type="number"><br><br>

                    <label>Fornecedor</label><br>
                    <input type="text"><br><br>

                    <label>Código de Barras</label><br>
                    <input type="number"><br><br>

                    <label>Localização no Estoque</label><br>
                    <input type="text"><br><br>

                    <label>Observações</label><br>
                    <textarea rows="5" cols="20"></textarea><br><br>

                    <input type="submit" value="Cadastrar Produto">

                    <br><br>

                    <p align="center"> <a href="inicio.html">inicio</a></p>

                </form>

            </td>
        </tr>

    </table>
