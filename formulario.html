<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
</head>
<body>
    <h1>exmplo de formulário</h1>
    <form>
        <label>nome:</label> <!--etiqueta-->
        <input type="text"><br> <br><!--cria uma caixa de texto-->
        <label>senha:</label>
        <input type="password"><br><br>
        <label>sugestão:</label>
        <textarea rows="5" cols="5" maxlength="10" minlength="3"></textarea>
        <br><br>
        <label>cidade:</label>
        <select><!--tag que inicia um menu dropdown-->
            <option>aragarças</option>
            <option>barra do garças</option>
            <option>pontal do araguaia</option>
        </select><br><br>
        <label>você mora na cidade que estuda?:</label>
        <br>
        <input type="radio" name="opcao" checked>
        <label>sim</label><br>
        <input type="radio" name="opcao">
        <label>não</label><br><br>
        <label>preferencias:</label>
        <input type="checkbox"><!-- o checkbox permite mutiplas marcaçoes-->
        <label>cachoeira</label>
        <input type="checkbox">
        <label>aguas termais</label>
        <input type="checkbox"><br> <br>
        <button>enviar</button><br><br>
        <label > sua cor favorita:</label>
        <input type="color"><br><br>
        <label>aniversario:</label>
        <input type="date"><br> <br>
        <label>E-mail</label> 
        <input type="email"><br><br>
        <label>adicionar arquivo:</label>
        <input type="file"><br><br>
        <label> uma foto para o crush:</label>
        <input type="file"><br><br>
        <label> volume</label>
        <input type="range">
    </form>
</body>
</html>
